<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  overflow: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
}

.ticker-wrap {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: rgba(10, 20, 40, 0.75);
  display: flex;
  align-items: center;
  overflow: hidden;
}

.label {
  color: #ffffff;
  font-weight: bold;
  margin-left: 20px;
  margin-right: 20px;
  font-size: 22px;
  border-right: 2px solid rgba(255,255,255,0.3);
  padding-right: 15px;
}

.ticker-container {
  overflow: hidden;
  flex: 1;
}

.ticker {
  white-space: nowrap;
  color: #ffffff;
  font-size: 22px;
  animation: scroll 20s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div class="ticker-wrap">
  <div class="label">NOW PLAYING</div>
  <div class="ticker-container">
    <div class="ticker" id="tickerText">
      Loading...
    </div>
  </div>
</div>

<script>
async function updateTicker() {
  try {
    const response = await fetch('nowplaying.txt?' + new Date().getTime());
    const text = await response.text();
    document.getElementById('tickerText').innerText = text;
  } catch (e) {
    console.log("Error loading ticker");
  }
}

// Update immediately
updateTicker();

// Refresh every 5 seconds
setInterval(updateTicker, 5000);
</script>

</body>
</html>
