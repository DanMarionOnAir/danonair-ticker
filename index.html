<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  overflow: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
}

.ticker-wrap {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: rgba(10, 20, 40, 0.75);
  display: flex;
  align-items: center;
  overflow: hidden;
  box-sizing: border-box;
}

.label {
  flex: 0 0 auto;
  color: #ffffff;
  font-weight: bold;
  font-size: 22px;
  margin-left: 20px;
  padding-right: 18px;
  border-right: 2px solid rgba(255,255,255,0.25);
  z-index: 2;
}

.ticker-container {
  position: relative;
  flex: 1;
  height: 100%;
  overflow: hidden;
  margin-left: 18px;
}

.ticker {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  color: #ffffff;
  font-size: 22px;
  will-change: transform;
  animation: tickerScroll 18s linear infinite;
}

@keyframes tickerScroll {
  0% {
    transform: translate(100%, -50%);
  }
  100% {
    transform: translate(-100%, -50%);
  }
}
</style>
</head>
<body>
  <div class="ticker-wrap">
    <div class="label">NOW PLAYING</div>
    <div class="ticker-container">
      <div class="ticker">Kiss From a Rose — Seal</div>
    </div>
  </div>
</body>
</html>
